name: Gráficos y dashboards de sensores

on:
  workflow_run:
    workflows: ["Descarga diaria sensores ESP"]   # debe coincidir con el "name:" de daily.yml
    types:
      - completed
  workflow_dispatch: {}   # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  graficos:
    runs-on: ubuntu-22.04
    # Solo corre si daily.yml terminó con éxito (o si se dispara a mano)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Generar gráficos diarios (con alertas)
        run: |
          ULTIMO=$(ls -1 datos/sensores_*.xlsx | sort | tail -n 1)
          FECHA=$(basename "$ULTIMO" .xlsx | sed 's/sensores_//')
          echo "Usando el archivo más reciente disponible: $ULTIMO (fecha $FECHA)"

          ARCHIVO_ALERTAS="alertas/alertas_${FECHA}.xlsx"
          if [ -f "$ARCHIVO_ALERTAS" ]; then
            python3 procesar_sensores.py "$ULTIMO" --alertas "$ARCHIVO_ALERTAS" --outdir "docs/diario/${FECHA}"
          else
            echo "No hay archivo de alertas para $FECHA, se grafica sin overlay"
            python3 procesar_sensores.py "$ULTIMO" --outdir "docs/diario/${FECHA}"
          fi

      - name: Generar dashboard semanal
        run: |
          python3 generar_dashboard_periodo.py \
            --datos-dir datos \
            --alertas-dir alertas \
            --dias 7 \
            --outdir docs \
            --nombre-salida reporte_semanal.html

      - name: Generar dashboard mensual
        run: |
          python3 generar_dashboard_periodo.py \
            --datos-dir datos \
            --alertas-dir alertas \
            --dias 30 \
            --outdir docs \
            --nombre-salida reporte_mensual.html

      - name: Generar página de inicio (index.html)
        run: python3 generar_index.py --docs-dir docs

      - name: Guardar resultados en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Gráficos y dashboards $(date +'%Y-%m-%d')" || echo "Sin cambios para commitear"
          git push
