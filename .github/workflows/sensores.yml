name: Sensores - descarga, gráficos y dashboard

on:
  schedule:
    - cron: "5 3 * * *"   # todos los días a las 00:05 hora Argentina (UTC-3)
  workflow_dispatch: {}     # permite correrlo manualmente desde GitHub

permissions:
  contents: write   # necesario para que el job pueda hacer commit/push

jobs:
  procesar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install pandas openpyxl matplotlib plotly playwright rclone-python
          playwright install --with-deps chromium

      # --- Paso existente: descarga con Playwright ---
      # Ajustá esto a tu script real. Debe guardar los dos archivos del día como:
      #   data/sensores/sensores_AAAA-MM-DD.xlsx
      #   data/alertas/alertas_AAAA-MM-DD.xlsx
      - name: Descargar datos y alertas del día (Playwright)
        run: |
          mkdir -p data/sensores data/alertas
          python3 scripts/descargar_espdesign.py \
            --salida-datos data/sensores \
            --salida-alertas data/alertas

      # --- Nuevo: gráficos diarios con overlay de alertas ---
      - name: Generar gráficos diarios
        run: |
          FECHA=$(date +%Y-%m-%d)
          python3 scripts/procesar_sensores.py \
            "data/sensores/sensores_${FECHA}.xlsx" \
            --alertas "data/alertas/alertas_${FECHA}.xlsx" \
            --outdir "docs/diario/${FECHA}"

      # --- Nuevo: dashboards semanal y mensual ---
      - name: Generar dashboard semanal
        run: |
          python3 scripts/generar_dashboard_periodo.py \
            --datos-dir data/sensores \
            --alertas-dir data/alertas \
            --dias 7 \
            --outdir docs \
            --nombre-salida reporte_semanal.html

      - name: Generar dashboard mensual
        run: |
          python3 scripts/generar_dashboard_periodo.py \
            --datos-dir data/sensores \
            --alertas-dir data/alertas \
            --dias 30 \
            --outdir docs \
            --nombre-salida reporte_mensual.html

      # --- Subida a Google Drive (tu paso existente con rclone) ---
      - name: Subir a Google Drive
        run: |
          rclone copy data/sensores gdrive:sensores/datos --config rclone.conf
          rclone copy data/alertas gdrive:sensores/alertas --config rclone.conf
          rclone copy "docs/diario/$(date +%Y-%m-%d)" "gdrive:sensores/graficos/$(date +%Y-%m-%d)" --config rclone.conf

      # --- Commit de todo lo generado (datos crudos + gráficos + dashboards) ---
      - name: Commit y push de resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "Datos y gráficos del $(date +%Y-%m-%d)"
          git push
