name: Descarga diaria sensores ESP

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  descargar-datos:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Chromium para Playwright
        run: playwright install --with-deps chromium

      - name: Descargar datos de sensores
        env:
          ESP_USERNAME: ${{ secrets.ESP_USERNAME }}
          ESP_PASSWORD: ${{ secrets.ESP_PASSWORD }}
        run: python download_sensors.py

      - name: Descargar registro de alertas
        env:
          ESP_USERNAME: ${{ secrets.ESP_USERNAME }}
          ESP_PASSWORD: ${{ secrets.ESP_PASSWORD }}
        run: python download_alertas.py

      - name: Subir capturas si hubo error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-alertas
          path: "*.png"

      - name: Guardar archivos en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos/ alertas/
          git commit -m "Datos y alertas $(date +'%Y-%m-%d')" || echo "Sin archivos nuevos"
          git push
